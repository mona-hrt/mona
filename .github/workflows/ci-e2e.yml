name: CI - E2E

# Patrol drives the real app on an Android emulator. Patrol has no Linux-desktop
# support, so these tests cannot run on a plain runner — they need the
# KVM-accelerated emulator from reactivecircus/android-emulator-runner. This job
# is intentionally separate from ci-pr.yml because the emulator makes it slow.
on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e_android:
    name: Patrol Android
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: .fvmrc
          cache: true

      # Pin a JDK for the Android Gradle build so it never falls back to an
      # invalid JAVA_HOME (AGP needs JDK 17).
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Get dependencies
        # Installs the Patrol framework AND the Patrol CLI: patrol_cli is a
        # dev_dependency (pinned in pubspec.lock), so there is no separate
        # `dart pub global activate`. The CLI is run as `dart run patrol_cli:main`.
        run: flutter pub get

      # Cache the Gradle home so the Android build isn't cold on every run
      # (a cold build re-downloads AGP + deps and can take 10–20 min by itself).
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Build the app + instrumentation APKs outside the emulator.
      - name: Build Patrol APKs
        timeout-minutes: 25
        run: dart run patrol_cli:main build android --flavor standalone

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The app builds debug with applicationIdSuffix ".dev" (see
      # android/app/build.gradle), so the installed package under test is
      # com.deliacheminot.mona.dev — already set as patrol.android.package_name
      # in pubspec.yaml. Omitting --target runs every *_test.dart under
      # integration_test/ (the test_directory in pubspec.yaml).
      - name: Run Patrol tests on emulator
        timeout-minutes: 30
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          ram-size: 6144M
          heap-size: 1024M
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: dart run patrol_cli:main test --flavor standalone --verbose

      - name: Upload Patrol results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-results
          path: |
            build/app/outputs/androidTest-results/
            build/app/reports/
          if-no-files-found: ignore
